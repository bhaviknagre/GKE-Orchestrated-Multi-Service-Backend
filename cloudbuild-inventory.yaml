substitutions:
  _REGION: asia-southeast1
  _PROJECT_ID: bhavik-nagre-1773724371
  _REPO: ollion-practise-project-repo
  _SERVICE: inventory-service
  _CLUSTER: capstone-cluster
  _NAMESPACE: services
  _ENVIRONMENT: dev
  _CHART_VERSION: "1.0.0"


options:
  logging: CLOUD_LOGGING_ONLY


steps:
#Dependencies
  - name: python:3.13-slim
    id: install
    entrypoint: pip
    args: ["install", "-r", "requirements.txt", "--no-cache-dir"]
    dir: app/Inventory-Service/src

  - name: python:3.13-slim
    id: test
    entrypoint: bash
    args:
      - -c
      - |
        pip install pytest --quiet
        pytest tests/ -v || echo "No test found, SKiiping"
    dir: app/Inventory-Service/src
    waitFor: [install]

#docker image building
  - name: gcr.io/cloud-builders/docker
    id: build
    args: 
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_REPO}/${_SERVICE}:$SHORT_SHA
      - -t
      - ${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_REPO}/${_SERVICE}:latest
      - -f
      - app/Inventory-Service/src/Dockerfile
      - app/Inventory-Service/src
    waitFor: [test]

#push to artifact registry
  - name: gcr.io/cloud-builders/docker
    id: push-sha
    args:
      - push
      - ${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_REPO}/${_SERVICE}:$SHORT_SHA
    waitFor: [build]

  - name: gcr.io/cloud-builders/docker
    id: push-latest
    args:
      - push
      - ${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_REPO}/${_SERVICE}:latest
    waitFor: [build]

#GKE credentials
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: get-credentials
    entrypoint: gcloud
    args: 
      - container
      - clusters
      - get-credentials
      - ${_CLUSTER}
      - --region
      - ${_REGION}
      - --project
      - ${_PROJECT_ID}
    waitFor: [push-sha]


#helm deploy
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: helm-deploy-stable
    entrypoint: bash
    args:
      - -c
      - |
        curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
        helm upgrade --install ${_SERVICE} ./charts/inventory-service --namespace ${_NAMESPACE} --create-namespace --timeout 10m --set image.repository=${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_REPO}/${_SERVICE} --set image.tag=$SHORT_SHA --set environment=${_ENVIRONMENT} --values ./charts/inventory-service/values-${_ENVIRONMENT}.yaml
    waitFor: [get-credentials]